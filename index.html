<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palkar Matrimony Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="corner-flower top-left">🌸</div>
  <div class="corner-flower top-right">🌿</div>
  <div class="corner-flower bottom-right">🌸</div>

  <div class="container-fluid page-wrapper">
    <div class="row w-100 align-items-center justify-content-center">

      <div class="col-lg-5 d-flex justify-content-center">
        <div class="login-card">

          <div class="logo">
            <i class="bi bi-hearts"></i>
          </div>

          <h1>Welcome</h1>
          <p>Please enter your details below</p>

          <form>
            <div class="input-box">
              <i class="bi bi-envelope"></i>
              <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-box">
              <i class="bi bi-lock"></i>
              <input type="password" placeholder="Enter your password">
              <i class="bi bi-eye-slash eye"></i>
            </div>

            <div class="terms">
              <input type="checkbox">
              <span>I agree to the <a href="#">terms & conditions</a></span>
            </div>

            <button class="login-btn">Login 💞</button>

            <a href="#" class="forgot">Forgot Password?</a>

            <div class="register-text">
              Don't have account? <a href="#">Register now</a>
            </div>
          </form>

          <div class="balloon bottom-balloon">💗</div>
        </div>
      </div>

      <div class="col-lg-5 text-center image-section">
        <img src="couple.png" class="couple-img" alt="Couple image">
      </div>

    </div>

    <div class="balloon center-balloon">💖</div>
    <div class="settings-btn">⚙</div>
  </div>

</body>
</html>
