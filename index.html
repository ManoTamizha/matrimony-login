<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Login Page</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #182233, #050505);
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    .main-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .login-card {
      background: rgba(31, 42, 60, 0.92);
      width: 430px;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.45);
      z-index: 2;
    }

    .logo {
      font-size: 55px;
      color: white;
      text-align: center;
      margin-bottom: 10px;
    }

    .login-card h1 {
      text-align: center;
      color: #ff1f73;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .login-card p {
      text-align: center;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .input-box {
      background: #3d4a5f;
      border: none;
      height: 52px;
      color: white;
      border-radius: 28px;
      padding-left: 45px;
    }

    .input-box::placeholder {
      color: #d7d7d7;
    }

    .input-group-icon {
      position: relative;
      margin-bottom: 18px;
    }

    .input-group-icon i {
      position: absolute;
      top: 15px;
      left: 18px;
      color: #ddd;
      z-index: 3;
    }

    .eye-icon {
      left: auto !important;
      right: 20px;
      cursor: pointer;
    }

    .terms {
      font-size: 13px;
      margin-bottom: 15px;
    }

    .terms a,
    .register,
    .forgot {
      color: #ff1f73;
      text-decoration: none;
      font-weight: bold;
    }

    .login-btn {
      width: 100%;
      height: 52px;
      border-radius: 28px;
      border: none;
      background: #a51d58;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .forgot {
      text-align: right;
      display: block;
      margin-top: 12px;
      font-size: 13px;
    }

    .right-img {
      max-width: 430px;
      width: 100%;
      filter: drop-shadow(0 0 20px rgba(160,180,255,0.35));
      z-index: 2;
    }

    .heart-balloon {
      position: absolute;
      font-size: 70px;
      color: #ff2d78;
      animation: float 4s ease-in-out infinite;
    }

    .heart1 {
      left: 18%;
      bottom: 12%;
    }

    .heart2 {
      top: 12%;
      left: 47%;
      font-size: 60px;
    }

    .flower {
      position: absolute;
      right: 20px;
      bottom: 20px;
      font-size: 80px;
      color: #ff2d78;
      opacity: 0.9;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    @media (max-width: 991px) {
      body {
        overflow: auto;
      }

      .main-wrapper {
        padding: 40px 15px;
      }

      .right-section {
        margin-top: 35px;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="container-fluid main-wrapper">
    <div class="heart-balloon heart1">💗</div>
    <div class="heart-balloon heart2">💖</div>
    <div class="flower">🌸</div>

    <div class="row align-items-center justify-content-center w-100">
      
      <div class="col-lg-5 d-flex justify-content-center">
        <div class="login-card">
          <div class="logo">
            <i class="bi bi-hearts"></i>
          </div>

          <h1>Welcome</h1>
          <p>Please enter your details below</p>

          <form>
            <div class="input-group-icon">
              <i class="bi bi-envelope"></i>
              <input type="email" class="form-control input-box" placeholder="Enter your email">
            </div>

            <div class="input-group-icon">
              <i class="bi bi-lock"></i>
              <input type="password" class="form-control input-box" placeholder="Enter your password">
              <i class="bi bi-eye-slash eye-icon"></i>
            </div>

            <div class="form-check terms">
              <input class="form-check-input" type="checkbox" id="terms">
              <label class="form-check-label" for="terms">
                I agree to the <a href="#">terms & conditions</a>
              </label>
            </div>

            <button type="submit" class="login-btn">
              Login 💞
            </button>

            <a href="#" class="forgot">Forgot Password?</a>

            <p class="mt-4 mb-0">
              Don't have account?
              <a href="#" class="register">Register now</a>
            </p>
          </form>
        </div>
      </div>

      <div class="col-lg-5 right-section">
        <img src="couple.png" alt="Couple Love Image" class="right-img">
      </div>

    </div>
  </div>

</body>
</html>
